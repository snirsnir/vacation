<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח בקרת חופשות — טכנודע</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Dashboard-specific styles ── */
    .dash-controls {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      padding: 16px 20px; background: #fff; border-bottom: 1px solid #eee;
      position: sticky; top: 56px; z-index: 10;
    }
    .dash-controls input[type=text],
    .dash-controls select {
      padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; font-family: inherit; background: #fff;
    }
    .dash-controls input[type=text] { min-width: 180px; }
    .view-toggle-dash { display: flex; gap: 0; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    .view-toggle-dash button {
      padding: 7px 16px; border: none; background: #fff; cursor: pointer;
      font-size: 13px; font-family: inherit; font-weight: 600; color: #555;
    }
    .view-toggle-dash button.active { background: #0056b3; color: #fff; }
    .report-sub-btn {
      padding: 12px 22px; border: none; background: none; cursor: pointer;
      font-size: 14px; font-family: inherit; font-weight: 600; color: #888;
      border-bottom: 3px solid transparent; margin-bottom: -1px;
    }
    .report-sub-btn.active { color: #0056b3; border-bottom-color: #0056b3; }
    .report-bar {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      padding: 20px 24px 0;
    }
    .report-bar select { padding: 9px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; min-width: 180px; }
    .report-preview-wrap { padding: 20px 24px; }
    .report-preview-frame {
      border: 1px solid #ddd; border-radius: 10px; overflow: hidden;
      background: #eef2f7;
    }
    .report-action-bar {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 12px 24px; background: #f4f6fa; border-top: 1px solid #eee;
    }
    @media print {
      body > *:not(#printTarget) { display: none !important; }
      #printTarget { display: block !important; }
    }
    .dash-section { display: none; }
    .dash-section.active { display: block; }

    /* ── Calendar ── */
    .cal-wrap { padding: 20px 24px; }
    .cal-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 18px;
    }
    .cal-nav button {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd;
      background: #fff; font-size: 18px; cursor: pointer; color: #0056b3;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav button:hover { background: #eef2ff; }
    .cal-nav-label { font-size: 18px; font-weight: 700; color: #1a1a1a; min-width: 160px; text-align: center; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; direction: rtl;
    }
    .cal-day-header {
      text-align: center; font-size: 12px; font-weight: 700;
      color: #888; padding: 6px 0;
    }
    .cal-day {
      min-height: 90px; border: 1px solid #eee; border-radius: 8px;
      padding: 6px; background: #fff; vertical-align: top;
      cursor: default; transition: box-shadow 0.15s;
    }
    .cal-day:hover { box-shadow: 0 2px 8px rgba(0,86,179,0.10); }
    .cal-day.empty { background: #fafafa; border-color: #f0f0f0; }
    .cal-day.weekend { background: #f9f9f9; }
    .cal-day.today { border-color: #0056b3; background: #f0f6ff; }
    .cal-day-num {
      font-size: 13px; font-weight: 700; color: #333; margin-bottom: 4px;
      display: block;
    }
    .cal-day.weekend .cal-day-num { color: #bbb; }
    .cal-badge {
      display: block; font-size: 11px; font-weight: 600; padding: 2px 6px;
      border-radius: 4px; margin-bottom: 2px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }
    .cal-more {
      font-size: 11px; color: #0056b3; font-weight: 600;
      cursor: pointer; margin-top: 2px;
    }

    /* ── Table ── */
    .table-wrap { padding: 0 24px 24px; }
    .month-group-header {
      background: linear-gradient(90deg, #0056b3 0%, #0073e6 100%);
      color: #fff; padding: 10px 16px; border-radius: 8px 8px 0 0;
      font-size: 15px; font-weight: 700; margin-top: 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .month-group-header .month-stats {
      font-size: 12px; opacity: 0.85; font-weight: 400;
    }
    .status-badge {
      display: inline-block; padding: 2px 10px; border-radius: 10px;
      font-size: 12px; font-weight: 700;
    }
    .status-approved  { background: #d4edda; color: #155724; }
    .status-partial   { background: #fff3cd; color: #856404; }
    .status-pending   { background: #e2e3e5; color: #383d41; }
    .status-rejected  { background: #f8d7da; color: #721c24; }
    .no-results { text-align: center; padding: 40px; color: #aaa; font-size: 15px; }

    /* ── Day modal ── */
    .day-modal-list { list-style: none; padding: 0; margin: 0; }
    .day-modal-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px;
    }
    .day-modal-list li:last-child { border-bottom: none; }
    .day-modal-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#0056b3;font-weight:700;">טוען...</p>
</div>
<div id="toast"></div>

<!-- ════ LOGIN ════ -->
<div class="view active" id="loginView">
  <div class="login-card">
    <div class="logo">📊</div>
    <h1>לוח בקרת חופשות</h1>
    <p>גישה מורשית בלבד</p>
    <div id="dashError" style="display:none;background:#f8d7da;color:#721c24;padding:14px;border-radius:8px;margin-bottom:16px;text-align:center;font-weight:600">
      ❌ אין לך הרשאה לצפות בלוח הבקרה
    </div>
    <button class="btn-google" id="btnDashLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      כניסה עם חשבון Google
    </button>
  </div>
</div>

<!-- ════ DASHBOARD ════ -->
<div class="view" id="dashView">

  <div class="topbar">
    <span class="topbar-brand">📊 לוח בקרת חופשות — טכנודע</span>
    <div class="topbar-user">
      <span id="dashUserName">—</span>
      <a href="index.html" style="background:#0056b3;color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;text-decoration:none;font-weight:600">🏖️ חזרה למערכת</a>
      <button class="btn-logout" id="btnDashLogout">יציאה</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="dash-controls">
    <div class="view-toggle-dash">
      <button id="btnDashCal"    class="active">📅 לוח שנה</button>
      <button id="btnDashTable">📋 טבלה</button>
      <button id="btnDashReport">📊 דוחות לחודש</button>
    </div>
    <input type="text" id="filterName" placeholder="חיפוש לפי שם עובד/ת..." />
    <select id="filterMonth">
      <option value="">כל החודשים</option>
    </select>
    <select id="filterStatus">
      <option value="">כל הסטטוסים</option>
      <option value="approved">מאושר</option>
      <option value="partial">מאושר חלקית</option>
      <option value="pending">ממתין</option>
      <option value="rejected">נדחה</option>
    </select>
    <button class="btn btn-outline" id="btnRefresh" style="margin-right:auto">רענן נתונים</button>
  </div>

  <div class="page-content" style="padding-top:0">
    <div class="card" style="margin-top:20px;overflow:visible">

      <!-- ── CALENDAR SECTION ── -->
      <div class="dash-section active" id="sectionCalendar">
        <div class="cal-wrap">
          <div class="cal-nav">
            <button id="calPrev">‹</button>
            <div class="cal-nav-label" id="calLabel">—</div>
            <button id="calNext">›</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

      <!-- ── TABLE SECTION ── -->
      <div class="dash-section" id="sectionTable">
        <div class="table-wrap" id="tableWrap"></div>
      </div>

      <!-- ── REPORT SECTION ── -->
      <div class="dash-section" id="sectionReport">

        <!-- Sub-toggle -->
        <div style="display:flex;gap:0;border-bottom:1px solid #eee;padding:0 24px">
          <button class="report-sub-btn active" id="btnReportByMonth">📅 לפי חודש</button>
          <button class="report-sub-btn" id="btnReportByEmp">👤 לפי עובד</button>
        </div>

        <!-- BY MONTH -->
        <div id="reportSubMonth">
          <div class="report-bar">
            <select id="reportMonthPicker"></select>
            <button class="btn btn-primary" id="btnExportReport">📊 ייצא דוח</button>
          </div>
          <div class="report-preview-wrap" id="reportPreviewWrap" style="display:none">
            <div class="report-preview-frame">
              <div id="reportPreviewBody"></div>
              <div class="report-action-bar">
                <button class="btn btn-outline" id="btnPrintReport2">🖨️ הדפסה</button>
                <button class="btn btn-primary"  id="btnNewWindowReport2">↗️ פתח בחלון נפרד</button>
              </div>
            </div>
          </div>
          <div id="reportEmpty" style="text-align:center;padding:60px;color:#aaa;font-size:15px;display:none">
            📭 אין חופשות מאושרות לחודש זה
          </div>
        </div>

        <!-- BY EMPLOYEE -->
        <div id="reportSubEmp" style="display:none">
          <div class="report-bar">
            <select id="reportEmpPicker" style="min-width:220px"></select>
            <button class="btn btn-primary" id="btnExportEmpReport">📊 ייצא דוח עובד</button>
          </div>
          <div class="report-preview-wrap" id="empPreviewWrap" style="display:none">
            <div class="report-preview-frame">
              <div id="empPreviewBody"></div>
              <div class="report-action-bar">
                <button class="btn btn-outline" id="btnPrintEmpReport">🖨️ הדפסה</button>
                <button class="btn btn-primary"  id="btnNewWindowEmpReport">↗️ פתח בחלון נפרד</button>
              </div>
            </div>
          </div>
          <div id="empReportEmpty" style="text-align:center;padding:60px;color:#aaa;font-size:15px;display:none">
            📭 אין חופשות לעובד זה
          </div>
        </div>

      </div>

    </div>
  </div>

</div>

<!-- ════ MODAL: Day Detail ════ -->
<div class="modal-overlay" id="modalDay">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <h2 id="modalDayTitle">—</h2>
      <button class="modal-close" id="btnCloseDayModal">✕</button>
    </div>
    <ul class="day-modal-list" id="modalDayList"></ul>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="config.js"></script>
<script src="db.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
